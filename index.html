<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Peshawar Agri-GIS Dashboard</title>

    <link
      rel="stylesheet"
      href="https://unpkg.com/leaflet@1.7.1/dist/leaflet.css"
    />

    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/leaflet.draw/1.0.4/leaflet.draw.css"
    />

    <style>
      body {
        margin: 0;
        padding: 0;
        display: flex;
        font-family: "Segoe UI", sans-serif;
        height: 100vh;
        overflow: hidden;
        background: #f4f7f6;
      }
      #sidebar {
        width: 380px;
        background: #1a252f;
        color: white;
        padding: 20px;
        box-sizing: border-box;
        z-index: 1001;
        display: flex;
        flex-direction: column;
      }
      #map {
        flex-grow: 1;
        height: 100vh;
        position: relative;
        background: #eee;
      }

      .stats-container {
        display: flex;
        gap: 10px;
        margin-bottom: 20px;
      }
      .stat-box {
        background: #2c3e50;
        padding: 15px;
        border-radius: 8px;
        flex: 1;
        text-align: center;
        border-bottom: 4px solid #27ae60;
      }
      .stat-box h3 {
        margin: 0;
        font-size: 1.2em;
        color: #27ae60;
      }

      #inspector {
        background: #34495e;
        padding: 15px;
        border-radius: 8px;
        margin-bottom: 20px;
        border: 1px solid #455a64;
        min-height: 120px;
      }

      input,
      select,
      button {
        width: 100%;
        padding: 10px;
        margin-bottom: 10px;
        border-radius: 4px;
        border: none;
        font-size: 14px;
      }
      .save-btn {
        background: #27ae60;
        color: white;
        font-weight: bold;
        cursor: pointer;
      }
      .delete-btn {
        background: #e74c3c;
        color: white;
        cursor: pointer;
        padding: 5px;
        margin-top: 10px;
        border-radius: 4px;
      }

      #filter-bar {
        position: absolute;
        top: 20px;
        left: 400px;
        z-index: 1000;
        display: flex;
        gap: 10px;
      }
      .f-btn {
        padding: 8px 15px;
        border-radius: 20px;
        border: none;
        color: white;
        font-weight: bold;
        cursor: pointer;
        box-shadow: 0 2px 5px rgba(0, 0, 0, 0.2);
        transition: 0.2s;
      }
      .f-btn:hover {
        transform: scale(1.1);
      }
    </style>
  </head>
  <body>
    <div id="sidebar">
      <div class="form-group" style="margin-bottom: 20px">
        <label style="color: #f1c40f">🔍 FIND A FARMER</label>
        <input
          type="text"
          id="search_input"
          placeholder="Type name (e.g. Ali)..."
          oninput="searchFarmer()"
        />
      </div>

      <h2>Peshawar Agri-GIS</h2>
      <div class="stats-container">
        <div class="stat-box">
          <h3 id="stat-count">0</h3>
          <p>Farms</p>
        </div>
        <div class="stat-box">
          <h3 id="stat-acres">0</h3>
          <p>Total Acres</p>
        </div>
      </div>
      <div id="inspector">
        <h4 style="margin: 0 0 10px 0; color: #f1c40f">🔍 Farm Inspector</h4>
        <div id="inspect-content">
          <p style="opacity: 0.6; font-size: 0.9em">
            Click a farm on the map to see its database records.
          </p>
        </div>
      </div>
      <div
        style="
          margin-top: auto;
          border-top: 1px solid #455a64;
          padding-top: 20px;
        "
      >
        <label>Draw New Farm</label>
        <input type="text" id="owner_name" placeholder="Owner Name" />
        <select id="crop_type">
          <option value="Wheat">Wheat</option>
          <option value="Maize">Maize</option>
          <option value="Sugarcane">Sugarcane</option>
          <option value="Tobacco">Tobacco</option>
          <option value="Vegetables">Vegetables</option>
        </select>
        <button onclick="saveBoundary()" class="save-btn">
          💾 Save to Database
        </button>
      </div>
    </div>

    <div id="map">
      <div id="filter-bar">
        <button
          class="f-btn"
          onclick="updateUI('All')"
          style="background: #95a5a6"
        >
          All
        </button>
        <button
          class="f-btn"
          onclick="updateUI('Wheat')"
          style="background: #f1c40f; color: black"
        >
          🌾 Wheat
        </button>
        <button
          class="f-btn"
          onclick="updateUI('Maize')"
          style="background: #e67e22"
        >
          🌽 Maize
        </button>
        <button
          class="f-btn"
          onclick="updateUI('Sugarcane')"
          style="background: #27ae60"
        >
          🎋 Sugarcane
        </button>
        <button
          class="f-btn"
          onclick="updateUI('Tobacco')"
          style="background: #d35400"
        >
          🍂 Tobacco
        </button>
      </div>
    </div>

    <script src="https://unpkg.com/leaflet@1.7.1/dist/leaflet.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet.draw/1.0.4/leaflet.draw.js"></script>

    <script>
      // var map = L.map("map").setView([34.0151, 71.5249], 13);
      // L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
      //   attribution: "&copy; OpenStreetMap",
      // }).addTo(map);

      var englishStreets = L.tileLayer(
        "https://server.arcgisonline.com/ArcGIS/rest/services/World_Street_Map/MapServer/tile/{z}/{y}/{x}",
        {
          attribution: "Tiles &copy; Esri",
        },
      );

      var satellite = L.tileLayer(
        "https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}",
        {
          attribution: "Tiles &copy; Esri",
        },
      );

      var map = L.map("map", {
        center: [34.0151, 71.5249],
        zoom: 14,
        layers: [englishStreets],
      });

      var baseMaps = {
        "English Labels": englishStreets,
        "Satellite View": satellite,
      };
      L.control.layers(baseMaps).addTo(map);

      var drawnItems = new L.FeatureGroup().addTo(map);
      var drawControl = new L.Control.Draw({
        draw: {
          polygon: true,
          polyline: false,
          rectangle: true,
          circle: false,
          marker: false,
          circlemarker: false,
        },
        edit: { featureGroup: drawnItems },
      });
      map.addControl(drawControl);

      var latestGeometry = null;
      map.on(L.Draw.Event.CREATED, function (e) {
        drawnItems.clearLayers();
        latestGeometry = e.layer.toGeoJSON().geometry;
        drawnItems.addLayer(e.layer);
      });

      var farmLayer;

      function updateUI(filter = "All") {
        console.log("Updating UI with filter:", filter);

        fetch("http://localhost:8080/api/stats")
          .then((res) => res.json())
          .then((data) => {
            document.getElementById("stat-count").innerText =
              data.total_farms || 0;
            document.getElementById("stat-acres").innerText = data.total_acres
              ? data.total_acres.toLocaleString()
              : 0;
          })
          .catch((err) => console.error("Stats API error:", err));

        fetch("http://localhost:8080/api/get-boundaries")
          .then((res) => res.json())
          .then((data) => {
            if (farmLayer) {
              map.removeLayer(farmLayer);
            }

            var features = data.features || [];
            var filtered =
              filter === "All"
                ? features
                : features.filter((f) => f.properties.crop_type === filter);

            farmLayer = L.geoJSON(filtered, {
              style: function (f) {
                var cols = {
                  Wheat: "#f1c40f",
                  Maize: "#e67e22",
                  Sugarcane: "#27ae60",
                  Tobacco: "#d35400",
                  Vegetables: "#2ecc71",
                };
                return {
                  color: cols[f.properties.crop_type] || "orange",
                  weight: 3,
                  fillOpacity: 0.5,
                };
              },
              onEachFeature: function (f, l) {
                l.on("click", function () {
                  var acreage = f.properties.acres
                    ? f.properties.acres.toFixed(2)
                    : "0.00";
                  document.getElementById("inspect-content").innerHTML = `
                                    <p style="margin:0; font-size:0.8em; color:#bdc3c7;">OWNER</p>
                                    <p style="font-weight:bold; margin-bottom:10px;">${f.properties.owner_name}</p>
                                    <p style="margin:0; font-size:0.8em; color:#bdc3c7;">CROP TYPE</p>
                                    <p style="font-weight:bold; margin-bottom:10px;">${f.properties.crop_type}</p>
                                    <p style="margin:0; font-size:0.8em; color:#bdc3c7;">AREA</p>
                                    <p style="font-weight:bold; color:#2ecc71;">${acreage} Acres</p>
                                    <button onclick="deleteFarm(${f.properties.id})" class="delete-btn">🗑️ Delete From Database</button>
                                `;
                });
              },
            }).addTo(map);

            if (filter !== "All" && filtered.length > 0) {
              map.fitBounds(farmLayer.getBounds());
            }
          })
          .catch((err) => console.error("Map Data API error:", err));
      }

      function saveBoundary() {
        var name = document.getElementById("owner_name").value;
        var crop = document.getElementById("crop_type").value;

        if (!latestGeometry || !name) {
          alert(
            "Action Required: Draw a farm on the map AND enter owner name.",
          );
          return;
        }

        fetch("http://localhost:8080/api/add-boundary", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            owner_name: name,
            crop_type: crop,
            geometry: latestGeometry,
          }),
        })
          .then((res) => res.json())
          .then((data) => {
            alert(data.message);
            document.getElementById("owner_name").value = "";
            drawnItems.clearLayers();
            latestGeometry = null;
            updateUI();
          });
      }

      function deleteFarm(id) {
        if (
          confirm(
            "Industrial Action: Permanent deletion of this record from PostGIS. Continue?",
          )
        ) {
          fetch(`http://localhost:8080/api/delete-boundary/${id}`, {
            method: "DELETE",
          })
            .then((res) => res.json())
            .then((data) => {
              document.getElementById("inspect-content").innerHTML =
                '<p style="color:#e74c3c;">Record Deleted.</p>';
              updateUI();
            });
        }
      }

      function searchFarmer() {
        var input = document.getElementById("search_input").value.toLowerCase();

        if (input.length < 3) return;

        map.eachLayer(function (layer) {
          if (layer.feature && layer.feature.properties.owner_name) {
            var owner = layer.feature.properties.owner_name.toLowerCase();

            if (owner.includes(input)) {
              var center = layer.getBounds().getCenter();

              map.flyTo(center, 17, {
                animate: true,
                duration: 1.5,
              });

              layer.openPopup();

              layer.fire("click");
            }
          }
        });
      }

      updateUI();
    </script>
  </body>
</html>
