<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Peshawar Agriculture GIS</title>
    <link
      rel="stylesheet"
      href="https://unpkg.com/leaflet@1.7.1/dist/leaflet.css"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/leaflet.draw/1.0.4/leaflet.draw.css"
    />
    <script src="https://unpkg.com/leaflet@1.7.1/dist/leaflet.js"></script>
    <style>
      body {
        margin: 0;
        padding: 0;
        display: flex;
        font-family: "Segoe UI", sans-serif;
        height: 100vh;
      }
      #sidebar {
        width: 350px;
        background: #355370;
        color: white;
        padding: 20px;
        box-sizing: border-box;
        z-index: 1001;
      }
      #map {
        flex-grow: 1;
        height: 100%;
      }
      .form-group {
        margin-bottom: 15px;
      }
      label {
        display: block;
        margin-bottom: 5px;
        color: #ecf0f1;
      }
      input,
      select {
        width: 100%;
        padding: 10px;
        border-radius: 4px;
        border: none;
      }
      button {
        width: 100%;
        padding: 12px;
        background: #27ae60;
        color: white;
        border: none;
        border-radius: 4px;
        cursor: pointer;
        font-size: 16px;
        font-weight: bold;
      }
      button:hover {
        background: #2ecc71;
      }
    </style>
  </head>
  <body>
    <div id="sidebar">
      <h2>Farm Digitizer</h2>
      <p>Use the polygon tool to draw, then fill the form.</p>
      <hr />
      <div class="form-group">
        <label>Owner Name:</label>
        <input type="text" id="owner_name" placeholder="Enter Owner Name" />
      </div>
      <div class="form-group">
        <label>Crop Type:</label>
        <select id="crop_type">
          <option value="Wheat">Wheat</option>
          <option value="Maize">Maize</option>
          <option value="Sugarcane">Sugarcane</option>
        </select>
      </div>
      <button onclick="saveBoundary()">Save Farm boundary</button>
      <div id="status" style="margin-top: 10px"></div>
    </div>
    <div id="map"></div>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet.draw/1.0.4/leaflet.draw.js"></script>
    <script>
      var map = L.map("map").setView([34.0151, 71.5249], 14);
      L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png").addTo(
        map,
      );
      var drawnItems = new L.FeatureGroup();
      map.addLayer(drawnItems);

      var drawControl = new L.Control.Draw({
        draw: {
          polyline: false,
          polygon: true,
          circle: false,
          marker: false,
          circlemarker: false,
        },
        edit: { featureGroup: drawnItems },
      });
      map.addControl(drawControl);

      var latestGeometry = null;
      map.on(L.Draw.Event.CREATED, function (event) {
        drawnItems.clearLayers();
        var layer = event.layer;
        drawnItems.addLayer(layer);
        latestGeometry = layer.toGeoJSON().geometry;
      });

      function loadFarms() {
        fetch("http://localhost:8080/api/get-boundaries")
          .then((res) => res.json())
          .then((data) => {
            L.geoJSON(data, {
              style: { color: "#f39c12", weight: 2, fillOpacity: 0.4 },
              onEachFeature: function (feature, layer) {
                layer.bindPopup(
                  "<b>Owner:</b> " +
                    feature.properties.owner_name +
                    "<br><b>Crop:</b> " +
                    feature.properties.crop_type,
                );
              },
            }).addTo(map);
          });
      }
      loadFarms();

      function saveBoundary() {
        var name = document.getElementById("owner_name").value;
        var crop = document.getElementById("crop_type").value; // Fixed ID from 'crop' to 'crop_type'
        if (!latestGeometry || !name) {
          alert("Please draw a boundary and enter a name!");
          return;
        }

        fetch("http://localhost:8080/api/add-boundary", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            owner_name: name,
            crop_type: crop,
            geometry: latestGeometry,
          }),
        })
          .then((res) => res.json())
          .then((data) => {
            document.getElementById("status").innerText = "Saved Successfully!";
            drawnItems.clearLayers();
            loadFarms();
          });
      }
    </script>
  </body>
</html>
